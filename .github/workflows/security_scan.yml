name: Security Scan

on: [push, pull_request]

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'
    - name: Install Bandit
      run: pip install bandit
    - name: Run Bandit
      run: bandit -r src -ll

  pip-audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'
    - name: Install pip-audit
      run: pip install pip-audit
    - name: Run pip-audit
      run: pip-audit -r requirements.txt